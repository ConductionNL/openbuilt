name: Code Quality

on:
  push:
    branches: [main, development, feature/**, bugfix/**, hotfix/**]
  pull_request:
    branches: [main, master, development, beta]
  workflow_dispatch:

jobs:
  quality:
    uses: ConductionNL/.github/.github/workflows/quality.yml@main
    with:
      app-name: openbuilt
      php-version: "8.3"
      php-test-versions: '["8.3", "8.4"]'
      nextcloud-test-refs: '["stable31", "stable32", "stable33"]'
      enable-psalm: true
      enable-phpstan: true
      enable-phpmetrics: true
      enable-frontend: true
      enable-eslint: true
      enable-phpunit: true
      # Newman disabled (openbuilt#11): the collections need the `hello-world`
      # seed app + the `openbuilt`/`exportJob`/`application` registers
      # provisioned. `SeedHelloWorld` swallows exceptions, so when the
      # seed-against-OR path fails in CI the app simply isn't there and every
      # API call 404s (then the prerequest scripts JSONError on the 404 body).
      # Re-running the repair steps (disable/enable) didn't help — needs the
      # OR runtime-schema-API integration in `SeedHelloWorld` made CI-robust.
      # PHPUnit runs and is green.
      enable-newman: false
      database: sqlite
      newman-seed-command: 'php occ app:disable openbuilt && php occ app:enable openbuilt'
      # OpenRegister `development` carries the runtime-schema-API (auto-create
      # Register on application-type imports — OR PR #1464) and the lifecycle
      # engine (ObjectTransitionedEvent) that OpenBuilt's repair steps + the
      # Newman publish step need; `main` predates both. See openbuilt#29.
      additional-apps: '[{"repo":"ConductionNL/openregister","app":"openregister","ref":"development"}]'
      enable-sbom: true
